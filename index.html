<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse-games-Panel</title>
<style>
  :root { --bg: #111827; --card: #1F2937; --text: #FFFFFF; --primary: #10B981; --sub: #9CA3AF; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
  body { background: var(--bg); color: var(--text); padding: 20px; }
.login { max-width: 400px; margin: 50px auto; background: var(--card); padding: 30px; border-radius: 16px; text-align: center; }
.login h1 { color: var(--primary); margin-bottom: 10px; }
.login p { color: var(--sub); margin-bottom: 20px; }
  input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--sub); color: var(--text); border-radius: 8px; }
  input[type="file"] { padding: 8px; }
  button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 10px 0; }
  button:disabled { background: var(--sub); cursor: not-allowed; }
.panel { display: none; max-width: 800px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.add-btn { width: auto; padding: 10px 20px; font-size: 24px; }
.logout-btn { width: auto; padding: 10px 20px; background: #333; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: var(--card); width: 90%; max-width: 500px; padding: 20px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 20px; margin-bottom: 15px; }
  label { display: block; margin-top: 12px; font-size: 14px; color: var(--sub); }
.mod-list { margin-top: 20px; }
.mod-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.delete-btn { background: #EF4444; width: auto; padding: 8px 12px; }
.info { font-size: 12px; color: var(--sub); margin-top: 10px; text-align: center; }
.preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin: 8px 0; display: none; }
.tabs { display: flex; gap: 8px; margin: 8px 0; }
.tab { flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--sub); color: var(--text); border-radius: 8px; cursor: pointer; text-align: center; }
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.warning { background: #F59E0B; color: #111827; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; text-align: center; }
.upload-progress { background: var(--bg); border-radius: 10px; height: 8px; margin-top: 10px; overflow: hidden; display: none; }
.upload-progress-bar { background: var(--primary); height: 100%; width: 0%; transition: 0.3s; }
.error-msg { color: #EF4444; margin-top: 10px; display: none; font-size: 14px; }
</style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login" id="login">
    <div style="font-size: 40px;">🎮</div>
    <h1>Eclipse-games-Panel</h1>
    <p>Panel de Administración</p>
    <input type="password" id="pass" placeholder="Contraseña">
    <input type="password" id="tokenInput" placeholder="Github Token - ghp_xxxxx">
    <button onclick="login()">Entrar</button>
    <div class="error-msg" id="errorMsg">❌ Contraseña o Token incorrecto</div>
  </div>

  <!-- PANEL -->
  <div class="panel" id="panel">
    <div class="header">
      <h2>Mis Mods</h2>
      <div>
        <button class="add-btn" onclick="abrirModal()">+</button>
        <button class="logout-btn" onclick="logout()">Salir</button>
      </div>
    </div>
    <div class="mod-list" id="modList"></div>
    <p class="info">✅ Imágenes se suben a Github<br>✅ Tu web se actualiza sola en tiempo real</p>
  </div>

  <!-- MODAL AGREGAR -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title">Agregar Nuevo Mod</div>
      <div class="warning">⚠️ Comprime las fotos a menos de 500KB pa que vuele</div>

      <label>Nombre del mod</label>
      <input type="text" id="nombre" placeholder="Essentials Update V1.6">

      <label>Selecciona categoría</label>
      <select id="categoria">
        <option>ADDONS</option>
        <option>MAPAS</option>
        <option>SHADERS</option>
        <option>TEXTURAS</option>
        <option>DLC</option>
        <option>SKINS</option>
        <option>VERSIONES</option>
      </select>

      <label>Versión</label>
      <input type="text" id="version" placeholder="V1.6">

      <label>Descripción</label>
      <textarea id="desc" rows="3" placeholder="Trae nuevos items útiles y crafteos..."></textarea>

      <label>Link de descarga</label>
      <input type="text" id="link" placeholder="https://mediafire.com/...">

      <label>Imagen del mod</label>
      <div class="tabs">
        <div class="tab active" onclick="cambiarTab('archivo')">📁 Subir a Github</div>
        <div class="tab" onclick="cambiarTab('link')">🔗 Link</div>
      </div>

      <div id="tab-archivo">
        <input type="file" id="imagenArchivo" accept="image/*">
        <img id="preview" class="preview">
      </div>

      <div id="tab-link" style="display:none;">
        <input type="text" id="imagenLink" placeholder="https://i.imgur.com/ejemplo.png">
      </div>

      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="uploadProgressBar"></div>
      </div>

      <button onclick="guardarMod()" id="btnGuardar">Guardar Mod</button>
      <button style="background: var(--sub);" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, push, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  // ===== TU CONFIG DE FIREBASE - ECLIPSEMC OFICIAL =====
  const firebaseConfig = {
    apiKey: "AIzaSyADkSQHOPHqzRuxA_SHJvEZ03wi_FRq1hA",
    authDomain: "eclipsemc-oficial-proyect.firebaseapp.com",
    databaseURL: "https://eclipsemc-oficial-proyect-default-rtdb.firebaseio.com",
    projectId: "eclipsemc-oficial-proyect",
    storageBucket: "eclipsemc-oficial-proyect.firebasestorage.app",
    messagingSenderId: "641719760320",
    appId: "1:641719760320:web:cfdf6ae0753c21925e0425",
    measurementId: "G-BSJP4HL8LV"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ===== CONFIG GITHUB =====
  const GITHUB_REPO = 'calacas-cryypto/Eclipse_games';
  const GITHUB_FOLDER = 'imagenes';
  let GITHUB_TOKEN = '';

  const PASSWORD = "Ɛč̣ľịpĉẹ-mč̣"; // CAMBIA ESTA CONTRASEÑA WEE
  let tipoImagen = 'archivo';
  let imagenFile = null;

  window.login = function() {
    const pass = document.getElementById('pass').value;
    const token = document.getElementById('tokenInput').value.trim();

    if(pass === PASSWORD && token.startsWith('ghp_')) {
      GITHUB_TOKEN = token;
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      sessionStorage.setItem('eclipseToken', token);
      sessionStorage.setItem('eclipseLogin', 'true');
      cargarMods();
    } else {
      document.getElementById('errorMsg').style.display = 'block';
      setTimeout(() => {
        document.getElementById('errorMsg').style.display = 'none';
      }, 3000);
    }
  }

  window.logout = function() {
    sessionStorage.removeItem('eclipseToken');
    sessionStorage.removeItem('eclipseLogin');
    location.reload();
  }

  // Auto-login
  if(sessionStorage.getItem('eclipseLogin') === 'true') {
    const savedToken = sessionStorage.getItem('eclipseToken');
    if(savedToken) {
      GITHUB_TOKEN = savedToken;
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      cargarMods();
    }
  }

  document.getElementById('pass').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') login();
  });
  document.getElementById('tokenInput').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') login();
  });

  window.abrirModal = () => document.getElementById('modal').classList.add('active');

  window.cerrarModal = () => {
    document.getElementById('modal').classList.remove('active');
    limpiarCampos();
  }

  window.cambiarTab = function(tipo) {
    tipoImagen = tipo;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-archivo').style.display = tipo === 'archivo'? 'block' : 'none';
    document.getElementById('tab-link').style.display = tipo === 'link'? 'block' : 'none';
  }

  // PREVIEW DE IMAGEN
  document.getElementById('imagenArchivo').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
      if(file.size > 500000) {
        alert('Esta foto pesa más de 500KB. Comprimela o usa link');
        e.target.value = '';
        return;
      }
      imagenFile = file;
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('preview').src = e.target.result;
        document.getElementById('preview').style.display = 'block';
      }
      reader.readAsDataURL(file);
    }
  });

  function limpiarCampos() {
    document.getElementById('nombre').value = '';
    document.getElementById('version').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('link').value = '';
    document.getElementById('imagenArchivo').value = '';
    document.getElementById('imagenLink').value = '';
    document.getElementById('preview').style.display = 'none';
    imagenFile = null;
  }

  // SUBIR A GITHUB
  async function subirImagenGithub(file) {
    if(!GITHUB_TOKEN) throw new Error('No hay token. Cierra sesión y entra de nuevo.');

    const fileName = `eclipse_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
    const reader = new FileReader();

    return new Promise((resolve, reject) => {
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        document.getElementById('uploadProgress').style.display = 'block';
        document.getElementById('uploadProgressBar').style.width = '30%';

        try {
          const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FOLDER}/${fileName}`, {
            method: 'PUT',
            headers: {
              'Authorization': `token ${GITHUB_TOKEN}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: `Subir imagen EclipseMC: ${fileName}`,
              content: base64
            })
          });

          document.getElementById('uploadProgressBar').style.width = '100%';

          if (response.ok) {
            const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${GITHUB_FOLDER}/${fileName}`;
            setTimeout(() => {
              document.getElementById('uploadProgress').style.display = 'none';
              document.getElementById('uploadProgressBar').style.width = '0%';
            }, 500);
            resolve(url);
          } else {
            const error = await response.json();
            reject(`Error Github: ${error.message}`);
          }
        } catch (error) {
          reject(error);
        }
      };
      reader.readAsDataURL(file);
    });
  }

  window.guardarMod = async function() {
    const btnGuardar = document.getElementById('btnGuardar');
    btnGuardar.disabled = true;
    btnGuardar.innerText = 'Guardando...';

    const mod = {
      nombre: document.getElementById('nombre').value,
      categoria: document.getElementById('categoria').value,
      version: document.getElementById('version').value,
      desc: document.getElementById('desc').value,
      link: document.getElementById('link').value,
      fecha: Date.now(),
      descargas: 0
    };

    if(!mod.nombre ||!mod.link) {
      alert('Pon mínimo nombre y link de descarga we');
      btnGuardar.disabled = false;
      btnGuardar.innerText = 'Guardar Mod';
      return;
    }

    try {
      if(tipoImagen === 'archivo' && imagenFile) {
        if(imagenFile.size > 500000) {
          alert('La foto pesa más de 500KB. Usa link o comprímela');
          btnGuardar.disabled = false;
          btnGuardar.innerText = 'Guardar Mod';
          return;
        }
        btnGuardar.innerText = 'Subiendo a Github...';
        mod.imagen = await subirImagenGithub(imagenFile);
      } else {
        mod.imagen = document.getElementById('imagenLink').value || 'https://via.placeholder.com/300x150/10B981/FFFFFF?text=ECLIPSE';
      }

      btnGuardar.innerText = 'Guardando en Firebase...';
      await push(ref(db, 'mods'), mod);
      alert('MOD SUBIDO ÉLITE 🔥');
      cerrarModal();
    } catch (error) {
      alert('Error we: ' + error);
    } finally {
      btnGuardar.disabled = false;
      btnGuardar.innerText = 'Guardar Mod';
      document.getElementById('uploadProgress').style.display = 'none';
    }
  }

  function cargarMods() {
    onValue(ref(db, 'mods'), (snapshot) => {
      const lista = document.getElementById('modList');
      lista.innerHTML = '';
      const mods = snapshot.val();
      if(mods) {
        Object.entries(mods).reverse().forEach(([key, mod]) => {
          lista.innerHTML += `
            <div class="mod-item">
              <div>
                <strong>${mod.nombre}</strong><br>
                <small>${mod.categoria} - ${mod.version} | ⬇️ ${mod.descargas || 0}</small>
              </div>
              <button class="delete-btn" onclick="borrarMod('${key}')">Borrar</button>
            </div>
          `;
        });
      } else {
        lista.innerHTML = '<p style="text-align:center;color:var(--sub)">No hay mods aún. Agrega el primero +</p>';
      }
    });
  }

  window.borrarMod = function(key) {
    if(confirm('¿Seguro que quieres borrar este mod?')) {
      remove(ref(db, 'mods/' + key));
    }
  }
</script>
</body>
</html>
